<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Weather - World Capitals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .search-input {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.25);
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .weather-icon {
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="glass-card w-full max-w-md p-8 text-center relative overflow-hidden">
        <h1 class="text-2xl font-bold mb-6 flex items-center justify-center gap-3">
            <i class="fas fa-wind text-blue-400"></i> SkyCast Pro
        </h1>

        <!-- Formulario de búsqueda -->
        <form id="weatherForm" class="relative mb-8">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Search city (e.g. London, Tokyo...)" 
                class="search-input w-full py-4 px-6 rounded-2xl text-white placeholder-blue-200/60 pr-14"
                autocomplete="off"
            >
            <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 bg-blue-500 hover:bg-blue-400 text-white w-10 h-10 rounded-xl transition-all flex items-center justify-center shadow-lg">
                <i class="fas fa-search"></i>
            </button>
        </form>

        <!-- Estado de carga -->
        <div id="loader" class="hidden flex flex-col items-center justify-center py-12">
            <div class="loader mb-4"></div>
            <p class="text-sm text-blue-200">Fetching weather data...</p>
        </div>

        <!-- Contenido del clima -->
        <div id="weatherContent" class="hidden fade-in">
            <div class="mb-1 text-blue-300 font-semibold tracking-wider uppercase text-xs" id="date">--</div>
            <h2 class="text-3xl font-bold mb-1" id="cityName">--</h2>
            
            <div class="py-6">
                <i id="mainIcon" class="fas fa-cloud-sun text-8xl weather-icon text-yellow-300"></i>
            </div>

            <div class="text-7xl font-bold mb-2 tracking-tighter" id="temp">0°</div>
            <div class="text-lg mb-8 font-light text-blue-100 capitalize" id="description">Clear Sky</div>

            <div class="grid grid-cols-3 gap-2 bg-white/5 rounded-3xl p-5 border border-white/10">
                <div class="text-center">
                    <i class="fas fa-droplet mb-2 text-blue-400"></i>
                    <p class="text-[10px] uppercase text-blue-200 mb-1">Humidity</p>
                    <p class="font-bold text-sm" id="humidity">0%</p>
                </div>
                <div class="text-center border-x border-white/10">
                    <i class="fas fa-wind mb-2 text-emerald-400"></i>
                    <p class="text-[10px] uppercase text-blue-200 mb-1">Wind</p>
                    <p class="font-bold text-sm" id="wind">0 km/h</p>
                </div>
                <div class="text-center">
                    <i class="fas fa-temperature-three-quarters mb-2 text-orange-400"></i>
                    <p class="text-[10px] uppercase text-blue-200 mb-1">Feels Like</p>
                    <p class="font-bold text-sm" id="feelsLike">0°</p>
                </div>
            </div>
        </div>

        <!-- Mensaje de bienvenida -->
        <div id="welcomeMessage" class="py-12">
            <div class="mb-4 opacity-50">
                <i class="fas fa-map-marker-alt text-4xl"></i>
            </div>
            <p class="text-blue-100/70 font-light">Enter a city name to see the weather.</p>
        </div>

        <!-- Mensaje de error -->
        <div id="errorMessage" class="hidden py-4 px-6 bg-red-500/20 border border-red-500/30 rounded-2xl mt-4 text-red-200 text-sm">
            <i class="fas fa-exclamation-circle mr-2"></i> City not found. Try again.
        </div>
    </div>

    <script>
        const apiKey = 'ed60fcfbd110ee65c7150605ea8aceea';
        const form = document.getElementById('weatherForm');
        const input = document.getElementById('cityInput');
        const loader = document.getElementById('loader');
        const content = document.getElementById('weatherContent');
        const welcome = document.getElementById('welcomeMessage');
        const errorMsg = document.getElementById('errorMessage');

        const updateDate = () => {
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = new Date().toLocaleDateString('en-US', options);
        };

        const getIcon = (code) => {
            const icons = {
                '01': 'fa-sun text-yellow-400',
                '02': 'fa-cloud-sun text-yellow-200',
                '03': 'fa-cloud text-gray-300',
                '04': 'fa-cloud text-gray-400',
                '09': 'fa-cloud-showers-heavy text-blue-400',
                '10': 'fa-cloud-rain text-blue-300',
                '11': 'fa-bolt text-purple-400',
                '13': 'fa-snowflake text-white',
                '50': 'fa-smog text-gray-200'
            };
            return icons[code.substring(0, 2)] || 'fa-cloud';
        };

        const fetchWeather = async (city) => {
            loader.classList.remove('hidden');
            content.classList.add('hidden');
            welcome.classList.add('hidden');
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${apiKey}`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                displayWeather(data);
            } catch (err) {
                errorMsg.classList.remove('hidden');
                welcome.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        };

        const displayWeather = (data) => {
            document.getElementById('cityName').innerText = `${data.name}, ${data.sys.country}`;
            document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°`;
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('humidity').innerText = `${data.main.humidity}%`;
            document.getElementById('wind').innerText = `${Math.round(data.wind.speed * 3.6)} km/h`;
            document.getElementById('feelsLike').innerText = `${Math.round(data.main.feels_like)}°`;
            
            const iconElem = document.getElementById('mainIcon');
            iconElem.className = `fas ${getIcon(data.weather[0].icon)} text-8xl weather-icon`;
            
            updateDate();
            content.classList.remove('hidden');
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const city = input.value.trim();
            if (city) fetchWeather(city);
        });
    </script>
</body>
</html>
